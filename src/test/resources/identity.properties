#
# ── Multi-round modify + account verification example ─────────────────────────
#
# Uncomment the .tests line below to enable two rounds of modify/verifyAccounts
# for user1. Each round uses a qualifier (1, 2) to pick its property section.
#
# Phase flow:
#   1. create identity (always runs)
#   2. refresh (birthright role assignment)
#   3. aggregation (provision accounts on target apps)
#   4. verifyCreate (attributes + roles + accounts; all in expectedCreate section)
#   5. modify:1 + verifyModify:1  ← first modification round
#   6. modify:2 + verifyModify:2  ← second modification round
#   7. deleteAccounts / delete (cleanup)
#
#identity.user1.tests=create,task:RefreshIdentitySingle,task:LdapAccountAggregation,verifyCreate,\
#  modify:1,verifyModify:1,\
#  modify:2,verifyModify:2,deleteAccounts,delete
#
