# List of identity keys for multi-identity mode.
# Comma-separated list of identity keys. Required.
identities=user1

# --- Identity: user1 ---------------------------------------------------------
#
# INPUT attributes — used by IdentityDataFactory to build the SCIM create payload.
#
# .input.* ................ Standard SCIM 2.0 core attributes + enterprise extension.
#                          These map to "urn:ietf:params:scim:schemas:core:2.0:User"
#                          and "urn:ietf:params:scim:schemas:extension:enterprise:2.0:User".
#                          They are compiled into dedicated Java fields in the Identity POJO.
#                          managerValue is the IIQ 'id' of the manager identity (UUID).
#
# .input.sailpoint.* ...... SailPoint extension attributes (IIQ ObjectConfig equivalents).
#                          These map to "urn:ietf:params:scim:schemas:sailpoint:1.0:User"
#                          and are handled generically as Map<String, Object> — no Java
#                          code changes needed to add/remove them. Optional: skip the
#                          property line and the framework omits it from the payload.

# Per-identity test phase selection (optional).
# Comma-separated list of phases to execute. Absent = run all phases.
# Available phases:
#   create, task:<taskName>, verifyCreate,
#   modify, verifyModify,
#   deleteAccounts, delete
# The 'create' phase is optional — if omitted, the identity is looked up
# by userName via SCIM filter (must already exist in IIQ).
# Duplicate phases are allowed. Qualifier (colon) support:
#   task:<taskName>          → runs any IIQ task by name
#   modify:<qual>, verifyModify:<qual> → uses expectedModify.<qual>.*
# Examples:
#   modify:1, verifyModify:1   → uses property section expectedModify.1.*
#   modify:2, verifyModify:2   → uses property section expectedModify.2.*
# The unqualified forms (modify, verifyModify) use the bare expectedModify.*
# property section.
# Example:
#   identity.user3.tests=create,task:RefreshIdentitySingle,verifyCreate,delete
#
identity.user1.tests=create,\
					task:RefreshIdentitySingle,\
					task:LdapAccountAggregation,\
					verifyCreate,\
					modify:1,\
					verifyModify:1,\
					deleteAccounts,\
					delete

identity.user1.create.userName=john.doe
identity.user1.create.firstname=John
identity.user1.create.lastname=Doe
identity.user1.create.displayName=John Doe
identity.user1.create.email=john.doe@acme.com
identity.user1.create.userType=employee
identity.user1.create.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.create.managerDisplayName=The Administrator
identity.user1.create.active=true
identity.user1.create.sailpoint.title=Software Engineer
identity.user1.create.sailpoint.department=Engineering
identity.user1.create.sailpoint.location=New York
# Custom attributes can be added as needed, following the same pattern. For example:
identity.user1.create.sailpoint.Identity_End_Date=2027-12-31
# Multi-value array attribute (suffix [] in key name)
identity.user1.create.sailpoint.capabilities[]=Auditor,Role Administrator
#
# EXPECTED attributes — used by IdentityTest.verifyIdentity() for post-creation
# assertion. Same schema split applies: .expectedCreate.* for core + enterprise, .expectedCreate.sailpoint.*
# for the SailPoint extension. The {suffix} placeholder is replaced at runtime with
# System.currentTimeMillis() to match the unique suffix appended during creation.
#
identity.user1.expectedCreate.userName=john.doe.{suffix}
identity.user1.expectedCreate.firstname=John
identity.user1.expectedCreate.lastname=Doe
identity.user1.expectedCreate.displayName=John Doe
identity.user1.expectedCreate.email={suffix}.john.doe@acme.com
identity.user1.expectedCreate.userType=employee
identity.user1.expectedCreate.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.expectedCreate.managerDisplayName=The Administrator
identity.user1.expectedCreate.active=true
identity.user1.expectedCreate.sailpoint.title=Software Engineer
identity.user1.expectedCreate.sailpoint.department=Engineering
identity.user1.expectedCreate.sailpoint.location=New York
# Custom attributes can be added as needed, following the same pattern for verification. For example:
identity.user1.expectedCreate.sailpoint.Identity_End_Date=2027-12-31
identity.user1.expectedCreate.sailpoint.capabilities[]=Auditor,Role Administrator
#
# ROLES — comma-separated list of birthright role names expected after IIQ refresh.
# Verified by IdentityTest.doVerifyRoles() via SCIM roles query.
#
identity.user1.expectedCreate.roles=ALL_ACTIVE_USERS,LDAP_ALL_USERS
#
# ACCOUNTS — comma-separated list of account types for this identity.
# Each type has an application name, expected exists flag, and expected attributes.
# Verified by IdentityTest.doVerifyAccounts() via SCIM account $ref resolution.
# Multiple apps can be added by extending the comma-separated list and adding
# corresponding identity.<key>.account.<type>.* blocks:
#   identity.user1.accounts=ldap,ad
#   identity.user1.account.ad.application=ActiveDirectory-Test
#   identity.user1.account.ad.expected.exists=true
#   identity.user1.account.ad.expected.attributes.sAMAccountName=john.doe.{suffix}
identity.user1.accounts=ldap
identity.user1.account.ldap.application=LDAP-Test
identity.user1.account.ldap.expected.exists=true
identity.user1.account.ldap.expected.attributes.uid=john.doe.{suffix}
identity.user1.account.ldap.expected.attributes.cn=john.doe.{suffix}
identity.user1.account.ldap.expected.attributes.givenName=John
identity.user1.account.ldap.expected.attributes.sn=Doe
#-- Example of a second account type for the same identity:
identity.user1.account.ad.application=ActiveDirectory-Test
identity.user1.account.ad.expected.exists=true
identity.user1.account.ad.expected.attributes.sAMAccountName=john.doe.{suffix}
identity.user1.account.ad.expected.attributes.userPrincipalName=john.doe.{suffix}@acme.com
identity.user1.account.ad.expected.attributes.userAccountControl=512
identity.user1.account.ad.expected.attributes.givenName=John
identity.user1.account.ad.expected.attributes.sn=Doe
identity.user1.account.ad.expected.attributes.displayName=John Doe
identity.user1.account.ad.expected.attributes.mail={suffix}.john.doe@acme.com
#-- Example of a second account type for the same identity:
identity.user1.account.scim.application=SCIM-Test
identity.user1.account.scim.expected.exists=true
identity.user1.account.scim.expected.attributes.userName=john.doe.{suffix}
identity.user1.account.scim.expected.attributes.displayName=John Doe
identity.user1.account.scim.expected.attributes.givenName=John
identity.user1.account.scim.expected.attributes.familyName=Doe
identity.user1.account.scim.expected.attributes.mail={suffix}.john.doe@acme.com
identity.user1.account.scim.expected.attributes.active=true
#
# MODIFY attributes — documentation only (not read by Java).
# The SCIM PUT payload is built from .expectedModify.* below.
# See .expectedModify.* for the actual attribute snapshot used.
#
identity.user1.modify.1.displayName=John Doe PATCHED
identity.user1.modify.1.sailpoint.title=Senior Software Engineer
identity.user1.modify.1.sailpoint.Identity_End_Date=2029-12-31
identity.user1.modify.1.sailpoint.capabilities[]=Auditor,Rule Administrator

#
# EXPECTED AFTER MODIFY — used for both the SCIM PUT body and for
# post-modify verification. Must contain the full expected state after
# modification (both changed and unchanged attributes).
# For multiple modify rounds, add a qualifier suffix to the section:
#   .expectedModify.1.*, .expectedModify.2.*, etc.
# and use qualified phases in the .tests list (modify:1, verifyModify:1).
#
identity.user1.expectedModify.1.userName=john.doe.{suffix}
identity.user1.expectedModify.1.firstname=John
identity.user1.expectedModify.1.lastname=Doe
identity.user1.expectedModify.1.displayName=John Doe PATCHED
identity.user1.expectedModify.1.email={suffix}.john.doe@acme.com
identity.user1.expectedModify.1.userType=employee
identity.user1.expectedModify.1.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.expectedModify.1.managerDisplayName=The Administrator
identity.user1.expectedModify.1.active=true
identity.user1.expectedModify.1.sailpoint.title=Senior Software Engineer
identity.user1.expectedModify.1.sailpoint.department=Engineering
identity.user1.expectedModify.1.sailpoint.location=New York
identity.user1.expectedModify.1.sailpoint.Identity_End_Date=2029-12-31
identity.user1.expectedModify.1.sailpoint.capabilities[]=Auditor, Rule Administrator
# ------------------------------------------------------------------------------

