# List of identity keys for multi-identity mode.
# Comma-separated list of identity keys. Required.
identities=user1,user2

# --- Identity: user1 ---------------------------------------------------------
#
# INPUT attributes — used by IdentityDataFactory to build the SCIM create payload.
#
# .input.* ................ Standard SCIM 2.0 core attributes + enterprise extension.
#                          These map to "urn:ietf:params:scim:schemas:core:2.0:User"
#                          and "urn:ietf:params:scim:schemas:extension:enterprise:2.0:User".
#                          They are compiled into dedicated Java fields in the Identity POJO.
#                          managerValue is the IIQ 'id' of the manager identity (UUID).
#
# .input.sailpoint.* ...... SailPoint extension attributes (IIQ ObjectConfig equivalents).
#                          These map to "urn:ietf:params:scim:schemas:sailpoint:1.0:User"
#                          and are handled generically as Map<String, Object> — no Java
#                          code changes needed to add/remove them. Optional: skip the
#                          property line and the framework omits it from the payload.

# Per-identity test phase selection (optional).
# Comma-separated list of phases to execute. Absent = run all phases.
# Available phases:
#   refresh, aggregation, verifyCreate, verifyRoles, verifyAccounts,
#   modify, verifyModify, deleteAccounts, delete
# The 'create' phase always runs (mandatory).
# Example:
#   identity.user3.tests=create,refresh,verifyCreate,delete
#
identity.user1.tests=create,refresh,aggregation,verifyCreate,verifyRoles,verifyAccounts,modify,verifyModify,deleteAccounts,delete

identity.user1.input.userName=john.doe
identity.user1.input.firstname=John
identity.user1.input.lastname=Doe
identity.user1.input.displayName=John Doe
identity.user1.input.email=john.doe@acme.com
identity.user1.input.userType=employee
identity.user1.input.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.input.managerDisplayName=The Administrator
identity.user1.input.active=true
identity.user1.input.sailpoint.title=Software Engineer
identity.user1.input.sailpoint.department=Engineering
identity.user1.input.sailpoint.location=New York
# Custom attributes can be added as needed, following the same pattern. For example:
identity.user1.input.sailpoint.Identity_End_Date=2027-12-31
# Multi-value array attribute (suffix [] in key name)
identity.user1.input.sailpoint.capabilities[]=Auditor,Role Administrator
#
# EXPECTED attributes — used by IdentityTest.testVerifyIdentities() for post-creation
# assertion. Same schema split applies: .expected.* for core + enterprise, .expected.sailpoint.*
# for the SailPoint extension. The {suffix} placeholder is replaced at runtime with
# System.currentTimeMillis() to match the unique suffix appended during creation.
#
identity.user1.expected.userName=john.doe.{suffix}
identity.user1.expected.firstname=John
identity.user1.expected.lastname=Doe
identity.user1.expected.displayName=John Doe
identity.user1.expected.email={suffix}.john.doe@acme.com
identity.user1.expected.userType=employee
identity.user1.expected.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.expected.managerDisplayName=The Administrator
identity.user1.expected.active=true
identity.user1.expected.sailpoint.title=Software Engineer
identity.user1.expected.sailpoint.department=Engineering
identity.user1.expected.sailpoint.location=New York
# Custom attributes can be added as needed, following the same pattern for verification. For example:
identity.user1.expected.sailpoint.Identity_End_Date=2027-12-31
identity.user1.expected.sailpoint.capabilities[]=Auditor,Role Administrator
#
# ROLES — comma-separated list of birthright role names expected after IIQ refresh.
# Verified by IdentityTest.testVerifyBirthrightRoleAssignment().
#
identity.user1.expected.roles=ALL_ACTIVE_USERS,LDAP_ALL_USERS
#
# ACCOUNTS — comma-separated list of account types for this identity.
# Each type has an application name, expected exists flag, and expected attributes.
# Verified by IdentityTest.testVerifyAccounts() via SCIM account $ref resolution.
# Multiple apps can be added by extending the comma-separated list and adding
# corresponding identity.<key>.account.<type>.* blocks:
#   identity.user1.accounts=ldap,ad
#   identity.user1.account.ad.application=ActiveDirectory-Test
#   identity.user1.account.ad.expected.exists=true
#   identity.user1.account.ad.expected.attributes.sAMAccountName=john.doe.{suffix}
# The aggregation workflow is launched automatically for each app key found across
# all identities (see task.aggregation.<appKey> in config.properties).
#
identity.user1.accounts=ldap,ad,scim
identity.user1.account.ldap.application=LDAP-Test
identity.user1.account.ldap.expected.exists=true
identity.user1.account.ldap.expected.attributes.uid=john.doe.{suffix}
identity.user1.account.ldap.expected.attributes.cn=john.doe.{suffix}
identity.user1.account.ldap.expected.attributes.givenName=John
identity.user1.account.ldap.expected.attributes.sn=Doe
#-- Example of a second account type for the same identity:
identity.user1.account.ad.application=ActiveDirectory-Test
identity.user1.account.ad.expected.exists=true
identity.user1.account.ad.expected.attributes.sAMAccountName=john.doe.{suffix}
identity.user1.account.ad.expected.attributes.userPrincipalName=john.doe.{suffix}@acme.com
identity.user1.account.ad.expected.attributes.userAccountControl=512
identity.user1.account.ad.expected.attributes.givenName=John
identity.user1.account.ad.expected.attributes.sn=Doe
identity.user1.account.ad.expected.attributes.displayName=John Doe
identity.user1.account.ad.expected.attributes.mail={suffix}.john.doe@acme.com
#-- Example of a second account type for the same identity:
identity.user1.account.scim.application=SCIM-Test
identity.user1.account.scim.expected.exists=true
identity.user1.account.scim.expected.attributes.userName=john.doe.{suffix}
identity.user1.account.scim.expected.attributes.displayName=John Doe
identity.user1.account.scim.expected.attributes.givenName=John
identity.user1.account.scim.expected.attributes.familyName=Doe
identity.user1.account.scim.expected.attributes.mail={suffix}.john.doe@acme.com
identity.user1.account.scim.expected.attributes.active=true
#
# MODIFY attributes — used by IdentityTest.testModifyIdentities() to build a SCIM
# PATCH payload. Same schema split as input: .modify.* for core/enterprise,
# .modify.sailpoint.* for the SailPoint extension. Only changed attributes
# need to be listed — unchanged ones are inherited from input.
#
identity.user1.modify.displayName=John Doe PATCHED
identity.user1.modify.sailpoint.title=Senior Software Engineer
identity.user1.modify.sailpoint.Identity_End_Date=2029-12-31
identity.user1.modify.sailpoint.capabilities[]=Auditor,Rule Administrator

#
# EXPECTED AFTER MODIFY — used by IdentityTest.testVerifyModifiedIdentities()
# for post-PATCH assertion. Must contain the full expected state after
# modification (both changed and unchanged attributes).
#
identity.user1.expectedAfterModify.userName=john.doe.{suffix}
identity.user1.expectedAfterModify.firstname=John
identity.user1.expectedAfterModify.lastname=Doe
identity.user1.expectedAfterModify.displayName=John Doe PATCHED
identity.user1.expectedAfterModify.email={suffix}.john.doe@acme.com
identity.user1.expectedAfterModify.userType=employee
identity.user1.expectedAfterModify.managerValue=ac10c6819cc4176a819cc468045e00fe
identity.user1.expectedAfterModify.managerDisplayName=The Administrator
identity.user1.expectedAfterModify.active=true
identity.user1.expectedAfterModify.sailpoint.title=Senior Software Engineer
identity.user1.expectedAfterModify.sailpoint.department=Engineering
identity.user1.expectedAfterModify.sailpoint.location=New York
identity.user1.expectedAfterModify.sailpoint.Identity_End_Date=2029-12-31
identity.user1.expectedAfterModify.sailpoint.capabilities[]=Auditor, Rule Administrator
# ------------------------------------------------------------------------------

