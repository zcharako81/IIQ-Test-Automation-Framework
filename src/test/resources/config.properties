
# Base URL (no trailing slash)
base.url=http://localhost:8080/identityiq

# --- Authentication ---
auth.type=basic
username=REPLACE_ME
password=REPLACE_ME

# Optional defaults
workflow.name=My-WF-TaskLauncher
task.refresh=RefreshIdentitySingle

# Application aggregation tasks — one entry per app key used in identity.properties.
# The test derives unique app keys from all identity.<key>.accounts values and launches
# the corresponding task for each.
task.aggregation.ldap=LdapAccountAggregation
task.aggregation.ad=AdAccountAggregation
task.aggregation.scim=ScimAccountAggregration

# --- Optional suffix for uniqueness across test runs ---
# Three modes:
#   test.suffix=random             -> auto-generated from System.currentTimeMillis()
#   test.suffix=1712345678901      -> fixed value for cross-run identity reuse
#   test.suffix= (commented out)   -> no suffix, properties used as-is
# Default is 'random' (auto-generate). Set to a fixed value to reference
# identities from a specific prior run. Omit entirely to use values as-is.
# In all modes, {suffix} placeholders in identity.properties are resolved.
test.suffix=random

# --- Wait timeouts (read by TestUtils helpers) ---
wait.timeout.seconds=60
wait.poll.interval.ms=2000
wait.aggregation.poll.interval.ms=5000

# --- Logging ---
logging.enabled=false
